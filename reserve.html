<div class="container">
<h1>Reserve a Service</h1>

<form id="reservationForm" action="mailto:tyemail@example.com" method="post" enctype="text/plain">

<label>First Name</label>
<input id="firstName" name="First Name" type="text" required>

<label>Last Name</label>
<input name="Last Name" type="text" required>

<label>Email</label>
<input id="email" name="Email" type="email" required>

<label>Select Service</label>
<select name="Service">
<option>Creations</option>
<option>Editing</option>
<option>Online Learning</option>
<option>Technology Help</option>
</select>

<label>Project Description</label>
<textarea name="Project Description"></textarea>

<label>Comments</label>
<textarea name="Comments"></textarea>

<label>Work Type</label>
<select name="Work Type">
<option>Virtual</option>
<option>Physical (sent by post)</option>
</select>

<label>Address (if physical)</label>
<input name="Address" type="text">

<button type="submit">Submit Reservation</button>

<div id="successMsg" class="success"></div>
</form>
</div>
