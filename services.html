<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service Reservation</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
font-family: Arial;
background:#0b0f2a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

form{
background:#12194d;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#5b6cff;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3d4cff;
}

</style>

</head>

<body>

<form id="reservationForm">

<h2>Reserve a Service</h2>

<label>First Name*</label>
<input type="text" id="firstName" required>

<label>Last Name</label>
<input type="text" id="lastName">

<label>Email*</label>
<input type="email" id="email" required>

<label>Service*</label>
<select id="service" required>
<option value="">Select Service</option>
<option value="Creations">Creations</option>
<option value="Editing">Editing</option>
<option value="IT Help">IT Help</option>
<option value="Online Lessons">Online Lessons</option>
</select>

<label>Mini Service*</label>
<select id="miniService" required>
<option value="">Select mini service</option>
</select>

<button type="submit">Send Reservation</button>

</form>

<script src="reservation.js"></script>

</body>
</html>
